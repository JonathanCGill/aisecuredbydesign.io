site_name: AI Secured by Design
site_url: https://aisecuredbydesign.io/
site_description: >-
  AI Secured by Design, securing AI before it runs. Model selection,
  platform decisions, DevOps pipelines, MLOps, data security, and governance
  for trustworthy AI deployments.
site_author: Jonathan Gill

edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
  favicon: images/favicon.svg

plugins:
  - search
  - meta

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonathanCGill
      name: Jonathan Gill on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jonathancgill/
      name: Jonathan Gill on LinkedIn

copyright: >-
  Copyright &copy; 2026 Jonathan Gill | MIT License<br>
  Feedback welcome — <a href="mailto:feedback@aisecuredbydesign.io">feedback@aisecuredbydesign.io</a>

