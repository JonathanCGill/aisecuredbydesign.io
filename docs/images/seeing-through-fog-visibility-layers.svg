<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-label="Three-layer visibility architecture: Product agents at the bottom feed into a normalisation layer, which feeds into a unified visibility layer with dashboards and alerting">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="700" height="380" rx="8" fill="url(#bgGrad)"/>

  <text x="350" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">The Three Visibility Layers</text>

  <!-- Layer 1: Unified Visibility Layer -->
  <rect x="30" y="50" width="640" height="90" rx="10" fill="url(#topGrad)" filter="url(#shadow)"/>
  <text x="350" y="74" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">UNIFIED VISIBILITY LAYER</text>
  <text x="350" y="94" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe" text-anchor="middle">Cross-product dashboards, correlation engine, alerting</text>
  <text x="350" y="110" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe" text-anchor="middle">Agent registry, interaction graph, blast radius maps</text>

  <!-- Layer 2: Normalisation Layer -->
  <rect x="30" y="155" width="640" height="80" rx="10" fill="url(#midGrad)" filter="url(#shadow)"/>
  <text x="350" y="179" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">NORMALISATION LAYER</text>
  <text x="350" y="199" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">Common schema mapping, identity resolution, trace stitching</text>
  <text x="350" y="215" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#ddd6fe" text-anchor="middle">State taxonomy mapping, time synchronisation</text>

  <!-- Layer 3: Product Agents -->
  <g transform="translate(30, 250)">
    <!-- Product A -->
    <rect x="0" y="0" width="120" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="60" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Product A</text>
    <text x="60" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Agents</text>
    <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Own logging)</text>

    <!-- Product B -->
    <rect x="130" y="0" width="120" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Product B</text>
    <text x="190" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Agents</text>
    <text x="190" y="60" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Own logging)</text>

    <!-- Product C -->
    <rect x="260" y="0" width="120" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="320" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Product C</text>
    <text x="320" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Agents</text>
    <text x="320" y="60" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Own logging)</text>

    <!-- Product D -->
    <rect x="390" y="0" width="120" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Product D</text>
    <text x="450" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Agents</text>
    <text x="450" y="60" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Own logging)</text>

    <!-- Vendor Agents -->
    <rect x="520" y="0" width="120" height="90" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="580" y="24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Vendor</text>
    <text x="580" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Agents</text>
    <text x="580" y="60" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Vendor telemetry)</text>
  </g>
</svg>