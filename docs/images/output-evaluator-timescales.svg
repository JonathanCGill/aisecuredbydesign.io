<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="Output Evaluator operating at three timescales: Real-time per-action evaluation, Session per-task monitoring, and Campaign cross-task analysis">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="780" height="400" rx="8" fill="url(#bgGrad)"/>

  <!-- Outer container -->
  <rect x="20" y="15" width="740" height="370" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="390" y="48" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">OUTPUT EVALUATOR</text>

  <!-- Real-Time Panel -->
  <rect x="45" y="70" width="220" height="270" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">REAL-TIME</text>
  <text x="155" y="113" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(per-action)</text>

  <line x1="65" y1="125" x2="245" y2="125" stroke="#bfdbfe" stroke-width="1"/>

  <text x="155" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Pre-action Judge gate</text>
  <text x="155" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">for elevated risk actions</text>

  <text x="155" y="193" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Async post-action eval</text>
  <text x="155" y="208" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">for low-risk</text>

  <text x="155" y="238" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">&lt;5ms action classifier</text>

  <!-- Latency label -->
  <rect x="65" y="300" width="180" height="24" rx="12" fill="#dbeafe"/>
  <text x="155" y="316" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">Latency: 0–2s per elevated action</text>

  <!-- Session Panel -->
  <rect x="280" y="70" width="220" height="270" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="390" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">SESSION</text>
  <text x="390" y="113" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(per-task)</text>

  <line x1="300" y1="125" x2="480" y2="125" stroke="#ddd6fe" stroke-width="1"/>

  <text x="390" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Intent coherence</text>
  <text x="390" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">tracking</text>

  <text x="390" y="193" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Aggregate threshold</text>
  <text x="390" y="208" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">monitoring</text>

  <text x="390" y="238" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Sequence anomaly</text>
  <text x="390" y="253" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">detection</text>

  <!-- Latency label -->
  <rect x="300" y="300" width="180" height="24" rx="12" fill="#ede9fe"/>
  <text x="390" y="316" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#7c3aed" text-anchor="middle">Latency: async checkpoint</text>

  <!-- Campaign Panel -->
  <rect x="515" y="70" width="220" height="270" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="625" y="96" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">CAMPAIGN</text>
  <text x="625" y="113" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(cross-task)</text>

  <line x1="535" y1="125" x2="715" y2="125" stroke="#a7f3d0" stroke-width="1"/>

  <text x="625" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Cross-session pattern</text>
  <text x="625" y="163" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">correlation</text>

  <text x="625" y="193" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Identity-level</text>
  <text x="625" y="208" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">behavioral baselines</text>

  <text x="625" y="238" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Peer group deviation</text>

  <!-- Latency label -->
  <rect x="535" y="300" width="180" height="24" rx="12" fill="#d1fae5"/>
  <text x="625" y="316" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#059669" text-anchor="middle">Latency: async batch analysis</text>
</svg>