<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 680" role="img" aria-label="Idea to production pipeline: 8 stages from Strategic Alignment through Ongoing Governance, each with input, output, and guardrail type">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="780" height="680" rx="8" fill="url(#bgGrad)"/>
  <text x="390" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Idea to Production: The Full Pipeline</text>

  <!-- Stage 1 -->
  <rect x="30" y="48" width="160" height="55" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="110" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">STAGE 1</text>
  <text x="110" y="84" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Strategic Alignment</text>
  <text x="220" y="66" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Business problem</text>
  <text x="220" y="80" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Business case</text>
  <rect x="220" y="86" width="60" height="16" rx="8" fill="#fef3c7"/>
  <text x="250" y="97" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#92400e" text-anchor="middle">Detect</text>
  <line x1="110" y1="103" x2="110" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="30" y="126" width="160" height="55" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="110" y="146" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#bfdbfe" text-anchor="middle">STAGE 2</text>
  <text x="110" y="162" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Use Case Definition</text>
  <text x="220" y="144" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Business case</text>
  <text x="220" y="158" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Ten-question definition</text>
  <rect x="220" y="164" width="60" height="16" rx="8" fill="#fee2e2"/>
  <text x="250" y="175" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b" text-anchor="middle">Prevent</text>
  <line x1="110" y1="181" x2="110" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="30" y="204" width="160" height="55" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="110" y="224" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#ddd6fe" text-anchor="middle">STAGE 3</text>
  <text x="110" y="240" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Tool Selection</text>
  <text x="220" y="222" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Use case definition</text>
  <text x="220" y="236" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Technology decision</text>
  <rect x="220" y="242" width="60" height="16" rx="8" fill="#fee2e2"/>
  <text x="250" y="253" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b" text-anchor="middle">Prevent</text>
  <text x="310" y="253" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8">Exit: If not AI → standard SDLC</text>
  <line x1="110" y1="259" x2="110" y2="276" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="30" y="282" width="160" height="55" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="110" y="302" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">STAGE 4</text>
  <text x="110" y="318" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Risk Classification</text>
  <text x="220" y="300" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Definition + technology decision</text>
  <text x="220" y="314" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Scored risk profile + tier</text>
  <rect x="220" y="320" width="60" height="16" rx="8" fill="#fef3c7"/>
  <text x="250" y="331" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#92400e" text-anchor="middle">Detect</text>
  <line x1="110" y1="337" x2="110" y2="354" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5 -->
  <rect x="30" y="360" width="160" height="55" rx="8" fill="#ef4444" filter="url(#shadow)"/>
  <text x="110" y="380" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#fecaca" text-anchor="middle">STAGE 5</text>
  <text x="110" y="396" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Control Design</text>
  <text x="220" y="378" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Risk profile + use case + technology</text>
  <text x="220" y="392" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Control specification + PACE plan</text>
  <rect x="220" y="398" width="60" height="16" rx="8" fill="#fee2e2"/>
  <text x="250" y="409" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b" text-anchor="middle">Prevent</text>
  <line x1="110" y1="415" x2="110" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6 -->
  <rect x="30" y="438" width="160" height="55" rx="8" fill="#10b981" filter="url(#shadow)"/>
  <text x="110" y="458" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#d1fae5" text-anchor="middle">STAGE 6</text>
  <text x="110" y="474" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Build &amp; Test</text>
  <text x="220" y="456" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Control specification</text>
  <text x="220" y="470" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Working system with verified controls</text>
  <rect x="220" y="476" width="60" height="16" rx="8" fill="#fef3c7"/>
  <text x="250" y="487" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#92400e" text-anchor="middle">Detect</text>
  <line x1="110" y1="493" x2="110" y2="510" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 7 -->
  <rect x="30" y="516" width="160" height="55" rx="8" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="110" y="536" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#e0f2fe" text-anchor="middle">STAGE 7</text>
  <text x="110" y="552" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Deploy &amp; Operate</text>
  <text x="220" y="534" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Tested system</text>
  <text x="220" y="548" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Production system with monitoring</text>
  <rect x="220" y="554" width="60" height="16" rx="8" fill="#dbeafe"/>
  <text x="250" y="565" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1d4ed8" text-anchor="middle">Absorb</text>
  <line x1="110" y1="571" x2="110" y2="588" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 8 -->
  <rect x="30" y="594" width="160" height="55" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="110" y="614" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#c7d2fe" text-anchor="middle">STAGE 8</text>
  <text x="110" y="630" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Ongoing Governance</text>
  <text x="220" y="612" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Input: Production system</text>
  <text x="220" y="626" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Output: Continuous assurance</text>
  <rect x="220" y="632" width="60" height="16" rx="8" fill="#fef3c7"/>
  <text x="250" y="643" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#92400e" text-anchor="middle">Detect</text>

  <!-- Loop arrow from Stage 8 back -->
  <path d="M190,640 Q720,640 720,400 Q720,160 600,110 L590,110" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="710" y="400" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6366f1" text-anchor="end" transform="rotate(-90 710 400)">Periodic review → reassessment</text>
</svg>