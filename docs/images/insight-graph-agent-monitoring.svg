<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Graph database visualization of multi-agent interaction monitoring, showing normal agent nodes, anomalous agent, and the data pipeline from event stream through Memgraph to PACE escalation">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="nodeNormal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="nodeAnomaly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="nodeJudge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeTool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="anomalyGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="edgeArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="anomalyArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="pipeArrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="8" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Agent Interaction Graph: Anomaly Detection via Temporal Graph Analysis</text>
  <text x="400" y="44" font-family="Inter, system-ui, sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">Nodes = agents and tools. Edges = delegations, messages, tool calls. Red = anomalous pattern detected.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT PANEL: The Agent Interaction Graph         -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Graph panel border -->
  <rect x="20" y="58" width="430" height="340" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <text x="35" y="77" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Live Interaction Graph (Memgraph)</text>

  <!-- ── Normal edges (delegations, messages) ── -->
  <!-- Orchestrator to Analyst -->
  <line x1="160" y1="155" x2="105" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#edgeArrow)"/>
  <!-- Orchestrator to Researcher -->
  <line x1="190" y1="160" x2="260" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#edgeArrow)"/>
  <!-- Orchestrator to Compliance -->
  <line x1="175" y1="165" x2="185" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#edgeArrow)"/>
  <!-- Analyst to DB tool -->
  <line x1="80" y1="258" x2="60" y2="315" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#edgeArrow)"/>
  <!-- Researcher to RAG tool -->
  <line x1="285" y1="240" x2="330" y2="290" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#edgeArrow)"/>
  <!-- Analyst to Researcher (peer message) -->
  <line x1="115" y1="235" x2="255" y2="222" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#edgeArrow)"/>
  <!-- Compliance to Judge -->
  <line x1="210" y1="310" x2="305" y2="345" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#edgeArrow)"/>
  <!-- Researcher to Judge -->
  <line x1="290" y1="240" x2="320" y2="338" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#edgeArrow)"/>

  <!-- ── Anomalous edges (red, thicker) ── -->
  <!-- Analyst to UNKNOWN external API (anomaly!) -->
  <line x1="70" y1="245" x2="45" y2="185" stroke="#ef4444" stroke-width="2.5" marker-end="url(#anomalyArrow)" filter="url(#anomalyGlow)" opacity="0.8"/>
  <!-- Analyst sending unusual volume to Researcher -->
  <line x1="105" y1="250" x2="250" y2="235" stroke="#ef4444" stroke-width="2" marker-end="url(#anomalyArrow)" opacity="0.7"/>

  <!-- ── Agent nodes ── -->
  <!-- Orchestrator -->
  <circle cx="175" cy="140" r="20" fill="url(#nodeNormal)" filter="url(#glow)"/>
  <text x="175" y="144" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">ORCH</text>
  <text x="175" y="118" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">Orchestrator</text>
  <text x="175" y="108" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">score: 12</text>

  <!-- Analyst (ANOMALOUS) -->
  <circle cx="85" cy="240" r="22" fill="url(#nodeAnomaly)" filter="url(#anomalyGlow)"/>
  <text x="85" y="244" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">ANLST</text>
  <text x="85" y="217" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#dc2626" font-weight="600" text-anchor="middle">Analyst</text>
  <text x="85" y="207" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#dc2626" font-weight="700" text-anchor="middle">score: 73</text>

  <!-- Researcher -->
  <circle cx="275" cy="225" r="18" fill="url(#nodeNormal)" filter="url(#glow)"/>
  <text x="275" y="229" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">RSCH</text>
  <text x="275" y="205" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">Researcher</text>
  <text x="275" y="195" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">score: 18</text>

  <!-- Compliance -->
  <circle cx="195" cy="315" r="17" fill="url(#nodeNormal)" filter="url(#glow)"/>
  <text x="195" y="319" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#fff" text-anchor="middle">CMPL</text>
  <text x="195" y="340" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#475569" text-anchor="middle">Compliance</text>
  <text x="195" y="350" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">score: 8</text>

  <!-- Judge -->
  <circle cx="330" cy="352" r="16" fill="url(#nodeJudge)" filter="url(#glow)"/>
  <text x="330" y="356" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#fff" text-anchor="middle">JUDGE</text>
  <text x="330" y="375" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#7c3aed" text-anchor="middle">Judge</text>

  <!-- Tool: Database -->
  <rect x="33" y="320" width="50" height="22" rx="4" fill="url(#nodeTool)"/>
  <text x="58" y="335" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#fff" text-anchor="middle">DB Tool</text>

  <!-- Tool: RAG -->
  <rect x="310" y="290" width="50" height="22" rx="4" fill="url(#nodeTool)"/>
  <text x="335" y="305" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#fff" text-anchor="middle">RAG</text>

  <!-- Unknown external (anomalous target) -->
  <rect x="18" y="165" width="52" height="22" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="44" y="180" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#dc2626" text-anchor="middle">??? API</text>

  <!-- Anomaly callout -->
  <rect x="30" y="369" width="260" height="20" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="40" y="382" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#dc2626">ANOMALY:</text>
  <text x="95" y="382" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#b91c1c">New edge to unknown API + 4x message volume</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Pipeline + Detection              -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Pipeline panel -->
  <rect x="465" y="58" width="320" height="175" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <text x="480" y="77" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Near Real-Time Pipeline</text>

  <!-- Pipeline boxes -->
  <rect x="480" y="88" width="80" height="36" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="520" y="103" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#334155" text-anchor="middle">Agent Events</text>
  <text x="520" y="115" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">OB-1.1, OB-1.2</text>

  <line x1="560" y1="106" x2="585" y2="106" stroke="#64748b" stroke-width="1" marker-end="url(#pipeArrow)"/>

  <rect x="590" y="88" width="80" height="36" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="630" y="103" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#334155" text-anchor="middle">Stream</text>
  <text x="630" y="115" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">Kafka / Pulsar</text>

  <line x1="670" y1="106" x2="695" y2="106" stroke="#64748b" stroke-width="1" marker-end="url(#pipeArrow)"/>

  <rect x="700" y="88" width="72" height="36" rx="4" fill="#ede9fe" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="736" y="103" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#5b21b6" text-anchor="middle">Memgraph</text>
  <text x="736" y="115" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#7c3aed" text-anchor="middle">In-memory</text>

  <!-- Second row -->
  <line x1="736" y1="124" x2="736" y2="140" stroke="#64748b" stroke-width="1" marker-end="url(#pipeArrow)"/>

  <rect x="690" y="143" width="82" height="36" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="731" y="157" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#92400e" text-anchor="middle">Graph Algorithms</text>
  <text x="731" y="169" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#a16207" text-anchor="middle">PageRank, Louvain</text>

  <line x1="690" y1="161" x2="665" y2="161" stroke="#64748b" stroke-width="1" marker-end="url(#pipeArrow)"/>

  <rect x="580" y="143" width="82" height="36" rx="4" fill="#fef2f2" stroke="#f87171" stroke-width="0.8"/>
  <text x="621" y="157" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#991b1b" text-anchor="middle">Anomaly Detect</text>
  <text x="621" y="169" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#b91c1c" text-anchor="middle">OB-2.2, OB-3.4</text>

  <line x1="580" y1="161" x2="555" y2="161" stroke="#64748b" stroke-width="1" marker-end="url(#pipeArrow)"/>

  <rect x="480" y="143" width="72" height="36" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="0.8"/>
  <text x="516" y="157" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#065f46" text-anchor="middle">PACE</text>
  <text x="516" y="169" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#047857" text-anchor="middle">Escalation</text>

  <!-- Latency annotations -->
  <text x="575" y="134" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#94a3b8" text-anchor="middle">~50ms</text>
  <text x="690" y="90" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#94a3b8" text-anchor="middle">~10ms</text>
  <text x="571" y="185" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#475569" text-anchor="middle">Total: &lt;200ms event-to-alert</text>

  <!-- Timing bar -->
  <rect x="480" y="195" width="292" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="490" y="213" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#334155">Temporal windows:</text>
  <rect x="590" y="201" width="40" height="15" rx="3" fill="#dbeafe"/><text x="610" y="212" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#1e40af" text-anchor="middle">7-day</text>
  <rect x="635" y="201" width="40" height="15" rx="3" fill="#e0e7ff"/><text x="655" y="212" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#3730a3" text-anchor="middle">30-day</text>
  <rect x="680" y="201" width="40" height="15" rx="3" fill="#ede9fe"/><text x="700" y="212" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#5b21b6" text-anchor="middle">90-day</text>
  <rect x="725" y="201" width="40" height="15" rx="3" fill="#faf5ff"/><text x="745" y="212" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#7e22ce" text-anchor="middle">Anchor</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM RIGHT: Cypher query example              -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="465" y="242" width="320" height="155" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="480" y="260" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Anomaly query (Cypher)</text>

  <text x="480" y="280" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">MATCH</text>
  <text x="515" y="280" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">(a:Agent)-[e:ACTION]->(t:Target)</text>

  <text x="480" y="295" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">WHERE</text>
  <text x="515" y="295" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">e.timestamp > now() - duration('PT1H')</text>

  <text x="495" y="310" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">AND</text>
  <text x="520" y="310" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#fbbf24">NOT EXISTS</text>
  <text x="596" y="310" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0"> {</text>

  <text x="505" y="325" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">MATCH</text>
  <text x="540" y="325" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">(a)-[b:ACTION]->(t)</text>

  <text x="505" y="340" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">WHERE</text>
  <text x="540" y="340" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">b.timestamp &lt; now() - duration('P7D')</text>

  <text x="495" y="355" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">}</text>

  <text x="480" y="370" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#93c5fd">RETURN</text>
  <text x="525" y="370" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="7.5" fill="#e2e8f0">a.id, t.id, count(e), a.anomaly_score</text>

  <text x="480" y="388" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">// Find agents connecting to targets never seen in baseline</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM: Legend                                  -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="20" y="405" width="430" height="100" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <text x="35" y="423" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">Graph-Based Detection Patterns</text>

  <!-- Pattern 1 -->
  <circle cx="40" cy="442" r="5" fill="url(#nodeAnomaly)"/>
  <text x="52" y="445" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155" font-weight="600">New edge to unknown target</text>
  <text x="195" y="445" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b">Agent contacts an API or tool never seen in baseline graph</text>

  <!-- Pattern 2 -->
  <circle cx="40" cy="460" r="5" fill="url(#nodeAnomaly)"/>
  <text x="52" y="463" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155" font-weight="600">Edge weight spike</text>
  <text x="143" y="463" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b">Message volume between two agents exceeds 2 sigma from rolling baseline</text>

  <!-- Pattern 3 -->
  <circle cx="40" cy="478" r="5" fill="url(#nodeNormal)"/>
  <text x="52" y="481" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155" font-weight="600">Centrality shift</text>
  <text x="137" y="481" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b">Agent's PageRank or betweenness centrality changes significantly (new hub)</text>

  <!-- Pattern 4 -->
  <circle cx="40" cy="496" r="5" fill="url(#nodeJudge)"/>
  <text x="52" y="499" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155" font-weight="600">Community fragmentation</text>
  <text x="172" y="499" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748b">Louvain community structure changes: agent migrates to a different cluster</text>

  <!-- Right-side detection summary -->
  <rect x="465" y="405" width="320" height="100" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" opacity="0.7"/>
  <text x="480" y="423" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">Why Graph, Not Tabular?</text>

  <text x="480" y="441" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155">Tabular logs answer:</text>
  <text x="571" y="441" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">"What did Agent X do?"</text>

  <text x="480" y="457" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#334155">Graph queries answer:</text>
  <text x="576" y="457" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">"How did the system behave?"</text>

  <text x="480" y="476" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#1e293b" font-weight="600">Relationships are the data.</text>
  <text x="480" y="490" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">Delegation depth, communication topology, trust paths,</text>
  <text x="480" y="502" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">temporal edge patterns: all first-class citizens in a</text>
  <text x="480" y="514" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#64748b">graph, all multi-join nightmares in a relational table.</text>
</svg>