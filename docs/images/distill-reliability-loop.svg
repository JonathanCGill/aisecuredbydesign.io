<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <!-- Background -->
  <rect width="720" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">The 100/1 Reliability Loop</text>

  <!-- All Actions entry -->
  <rect x="275" y="45" width="170" height="40" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4338ca">All Agent Actions</text>

  <!-- Arrow down -->
  <line x1="360" y1="85" x2="360" y2="115" stroke="#475569" stroke-width="2"/>
  <polygon points="360,120 355,110 365,110" fill="#475569"/>

  <!-- SLM box (100% check) -->
  <rect x="220" y="125" width="280" height="70" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2.5"/>
  <text x="360" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#854d0e">SLM Sidecar (100% inline)</text>
  <text x="360" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a16207">Every action checked in &lt;50ms</text>

  <!-- 100% badge -->
  <rect x="520" y="140" width="75" height="28" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="557" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">100%</text>

  <!-- Arrow down to branch -->
  <line x1="360" y1="195" x2="360" y2="230" stroke="#475569" stroke-width="2"/>
  <circle cx="360" cy="235" r="6" fill="#475569"/>

  <!-- Left branch: GO (majority) -->
  <line x1="354" y1="235" x2="130" y2="235" stroke="#22c55e" stroke-width="2"/>
  <line x1="130" y1="235" x2="130" y2="270" stroke="#22c55e" stroke-width="2"/>
  <polygon points="130,275 125,265 135,265" fill="#22c55e"/>
  <rect x="175" y="222" width="100" height="20" rx="3" fill="#dcfce7"/>
  <text x="225" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">~98% GO</text>

  <rect x="50" y="280" width="160" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Action Executes</text>
  <text x="130" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Normal flow continues</text>

  <!-- Right branch: NO-GO (blocked) -->
  <line x1="366" y1="235" x2="590" y2="235" stroke="#ef4444" stroke-width="2"/>
  <line x1="590" y1="235" x2="590" y2="270" stroke="#ef4444" stroke-width="2"/>
  <polygon points="590,275 585,265 595,265" fill="#ef4444"/>
  <rect x="440" y="222" width="100" height="20" rx="3" fill="#fee2e2"/>
  <text x="490" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#b91c1c">~2% NO-GO</text>

  <rect x="510" y="280" width="160" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b91c1c">Blocked + Logged</text>
  <text x="590" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b91c1c">100% sent to Teacher</text>

  <!-- Random sample arrow from GO branch -->
  <line x1="130" y1="325" x2="130" y2="370" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="130,375 125,365 135,365" fill="#3b82f6"/>
  <text x="155" y="355" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">1% random sample</text>

  <!-- All blocked to Teacher -->
  <line x1="590" y1="325" x2="590" y2="370" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="590,375 585,365 595,365" fill="#3b82f6"/>
  <text x="615" y="355" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">100%</text>

  <!-- Teacher Model (deep audit) -->
  <rect x="175" y="380" width="470" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Teacher / Large Judge (Async Deep Audit)</text>
  <text x="410" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af">Verifies SLM verdict, generates fresh reasoning chain</text>

  <!-- 1% badge -->
  <rect x="50" y="392" width="100" height="28" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">1% sample</text>

  <!-- Arrow down from Teacher -->
  <line x1="410" y1="435" x2="410" y2="460" stroke="#475569" stroke-width="2"/>
  <circle cx="410" cy="465" r="5" fill="#475569"/>

  <!-- Agree branch -->
  <line x1="405" y1="465" x2="200" y2="465" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="55" y="453" width="140" height="28" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="471" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">Agree: Log + confirm</text>

  <!-- Disagree branch -->
  <line x1="415" y1="465" x2="530" y2="465" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="535" y="453" width="165" height="28" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="617" y="471" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#b91c1c">Disagree: Human review</text>

  <!-- Drift detection note -->
  <rect x="250" y="492" width="320" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="410" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Agreement &lt;99.5% triggers automatic retraining cycle</text>
</svg>
