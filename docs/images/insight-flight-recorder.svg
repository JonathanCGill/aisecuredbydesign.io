<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">The AI Flight Recorder</text>
  <text x="450" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">From scattered logs to a provenance chain you can replay, explain, and defend</text>

  <!-- Left side: Traditional Logging (fragmented) -->
  <g transform="translate(30, 80)">
    <text x="190" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#dc2626">Today: Scattered Logs</text>

    <!-- Fragmented log boxes -->
    <rect x="0" y="30" width="110" height="55" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="55" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Guardrail Logs</text>
    <text x="55" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">pass/block decisions</text>
    <text x="55" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#dc2626">no execution context</text>

    <rect x="130" y="30" width="110" height="55" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="185" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Model I/O Logs</text>
    <text x="185" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">prompt + response</text>
    <text x="185" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#dc2626">no causal chain</text>

    <rect x="260" y="30" width="110" height="55" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="315" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Judge Logs</text>
    <text x="315" y="63" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">scores + verdicts</text>
    <text x="315" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#dc2626">no replay capability</text>

    <!-- Problem callout -->
    <rect x="20" y="100" width="330" height="40" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="185" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">After an incident, you can answer "what happened"</text>
    <text x="185" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">but not "why" or "could it happen again?"</text>
  </g>

  <!-- Divider arrow -->
  <text x="450" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#64748b">→</text>

  <!-- Right side: Flight Recorder (unified) -->
  <g transform="translate(490, 80)">
    <text x="190" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#059669">Flight Recorder: Provenance Chain</text>

    <!-- Unified recorder box -->
    <rect x="0" y="30" width="380" height="110" rx="8" fill="#fff" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>

    <!-- Chain links inside -->
    <rect x="15" y="45" width="75" height="30" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="52" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">Input</text>

    <line x1="90" y1="60" x2="105" y2="60" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="105" y="45" width="75" height="30" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="142" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">Decision</text>

    <line x1="180" y1="60" x2="195" y2="60" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="195" y="45" width="75" height="30" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="232" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">Action</text>

    <line x1="270" y1="60" x2="285" y2="60" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="285" y="45" width="75" height="30" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="322" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">Outcome</text>

    <!-- Metadata underneath chain -->
    <text x="190" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">correlation_id + causal ordering + cryptographic integrity + full context</text>
    <text x="190" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">who asked, what was decided, why, what tools were used, what changed</text>

    <!-- Success callout -->
    <rect x="20" y="148" width="330" height="25" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="185" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">Replay any incident. Explain any decision. Prove compliance.</text>
  </g>

  <!-- Bottom section: What the recorder captures -->
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">What the Flight Recorder Captures</text>

  <!-- Five pillars -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Execution Provenance</text>
    <text x="80" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Who requested what</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Which agent acted</text>
    <text x="80" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Which tools were called</text>
    <text x="80" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Full decision chain</text>
  </g>

  <g transform="translate(200, 270)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Decision Rationale</text>
    <text x="80" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Why guardrails passed/blocked</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Judge reasoning + scores</text>
    <text x="80" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">PACE state at decision time</text>
    <text x="80" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Confidence thresholds used</text>
  </g>

  <g transform="translate(370, 270)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Data Lineage</text>
    <text x="80" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">What data was retrieved</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Which sources were cited</text>
    <text x="80" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">What context was injected</text>
    <text x="80" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">PII exposure points</text>
  </g>

  <g transform="translate(540, 270)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Control State</text>
    <text x="80" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Guardrail versions active</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Judge model + criteria version</text>
    <text x="80" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">System prompt hash</text>
    <text x="80" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Circuit breaker state</text>
  </g>

  <g transform="translate(710, 270)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#5b21b6">Integrity Proof</text>
    <text x="80" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Append-only storage</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Cryptographic hash chain</text>
    <text x="80" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Tamper-evident sequencing</text>
    <text x="80" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Independent of AI runtime</text>
  </g>

  <!-- Regulatory drivers bar -->
  <rect x="30" y="385" width="840" height="55" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="450" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Regulatory Drivers</text>
  <text x="150" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412">EU AI Act Art. 12</text>
  <text x="150" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">automatic event recording</text>
  <text x="350" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412">ISO 42001</text>
  <text x="350" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">AI management system logs</text>
  <text x="550" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412">NIST AI RMF</text>
  <text x="550" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">measure + manage functions</text>
  <text x="750" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9a3412">Australia Privacy Act 2026</text>
  <text x="750" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">ADM transparency rules</text>

  <!-- Bottom key insight -->
  <rect x="30" y="460" width="840" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Aviation learned this decades ago: you cannot investigate what you did not record.</text>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">AI systems making consequential decisions need the same discipline.</text>
</svg>
