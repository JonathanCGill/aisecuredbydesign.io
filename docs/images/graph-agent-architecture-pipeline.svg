<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" role="img" aria-label="Architecture pipeline: Agent events flow through a message bus to Kafka stream processor, which fans out to SIEM/SOAR, Memgraph for anomaly detection, and an immutable log store, with anomaly alerts feeding into PACE escalation">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="880" height="340" rx="8" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="440" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Architecture: Graph Database in the Observability Stack</text>

  <!-- Agent Events box -->
  <rect x="30" y="130" width="120" height="60" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="157" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Agent Events</text>
  <text x="90" y="200" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">OB-1.1, OB-1.2</text>

  <!-- Arrow: Agent Events → Message Bus -->
  <line x1="150" y1="160" x2="195" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Message Bus box -->
  <rect x="200" y="130" width="120" height="60" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="157" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Message Bus</text>
  <text x="260" y="200" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">MASO</text>

  <!-- Arrow: Message Bus → Stream -->
  <line x1="320" y1="160" x2="365" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stream (Kafka) box -->
  <rect x="370" y="130" width="130" height="60" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="435" y="152" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Stream</text>
  <text x="435" y="168" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(Kafka)</text>

  <!-- Fan-out arrows from Kafka -->
  <!-- Arrow to SIEM/SOAR (top) -->
  <path d="M500,145 L540,145 L540,75 L600,75" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow to Memgraph (middle) -->
  <line x1="500" y1="160" x2="600" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow to Log Store (bottom) -->
  <path d="M500,175 L540,175 L540,250 L600,250" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SIEM/SOAR box -->
  <rect x="605" y="50" width="140" height="50" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="72" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">SIEM / SOAR</text>
  <text x="675" y="88" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">OB-2.4</text>

  <!-- Memgraph box -->
  <rect x="605" y="130" width="140" height="60" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="152" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Memgraph</text>
  <text x="675" y="168" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(In-memory)</text>

  <!-- Arrow: Memgraph → Anomaly Alerts -->
  <line x1="745" y1="160" x2="780" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="810" y="155" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">Anomaly</text>
  <text x="810" y="168" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">Alerts</text>

  <!-- Arrow: Anomaly Alerts → PACE -->
  <path d="M810,175 L810,250 L810,270" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Log Store box -->
  <rect x="605" y="225" width="140" height="50" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="247" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Log Store</text>
  <text x="675" y="263" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">(Immutable) — OB-2.1</text>

  <!-- PACE box -->
  <rect x="775" y="275" width="70" height="40" rx="8" fill="#7c3aed" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="300" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PACE</text>
</svg>