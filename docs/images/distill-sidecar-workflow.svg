<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <!-- Background -->
  <rect width="720" height="620" fill="#f8fafc"/>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Security Sidecar Workflow</text>

  <!-- User/System Input -->
  <rect x="275" y="45" width="170" height="40" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4338ca">User / System Input</text>

  <!-- Arrow down -->
  <line x1="360" y1="85" x2="360" y2="110" stroke="#475569" stroke-width="2"/>
  <polygon points="360,115 355,105 365,105" fill="#475569"/>

  <!-- Primary AI Agent box -->
  <rect x="245" y="120" width="230" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Primary AI Agent</text>
  <text x="360" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">Generates proposed action / tool call</text>

  <!-- Context/RAG label on right -->
  <rect x="530" y="125" width="130" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="595" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Context / RAG</text>
  <line x1="530" y1="145" x2="475" y2="145" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="478,145 485,141 485,149" fill="#94a3b8"/>

  <!-- Arrow down: proposed action -->
  <line x1="360" y1="175" x2="360" y2="200" stroke="#475569" stroke-width="2"/>
  <polygon points="360,205 355,195 365,195" fill="#475569"/>
  <text x="370" y="195" font-family="Arial, sans-serif" font-size="9" fill="#64748b">proposed action</text>

  <!-- Sidecar SLM box (large, highlighted) -->
  <rect x="135" y="210" width="450" height="145" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2.5"/>
  <text x="360" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#854d0e">Security Sidecar (Distilled SLM)</text>
  <line x1="165" y1="245" x2="555" y2="245" stroke="#fde047" stroke-width="1.5"/>

  <!-- Three steps inside sidecar -->
  <rect x="160" y="260" width="130" height="45" rx="5" fill="#ffffff" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="225" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#854d0e">1. Intercept</text>
  <text x="225" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a16207">In-memory capture</text>

  <rect x="310" y="260" width="130" height="45" rx="5" fill="#ffffff" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="375" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#854d0e">2. Policy Check</text>
  <text x="375" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a16207">Adversarial logic</text>

  <rect x="460" y="260" width="100" height="45" rx="5" fill="#ffffff" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="510" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#854d0e">3. Verdict</text>
  <text x="510" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a16207">&lt;50ms</text>

  <!-- Arrows between sidecar steps -->
  <line x1="290" y1="282" x2="305" y2="282" stroke="#ca8a04" stroke-width="1.5"/>
  <polygon points="308,282 301,278 301,286" fill="#ca8a04"/>
  <line x1="440" y1="282" x2="455" y2="282" stroke="#ca8a04" stroke-width="1.5"/>
  <polygon points="458,282 451,278 451,286" fill="#ca8a04"/>

  <!-- Bank Policy feed into sidecar -->
  <rect x="10" y="265" width="110" height="35" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="65" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Bank Policy</text>
  <line x1="120" y1="282" x2="155" y2="282" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="158,282 150,278 150,286" fill="#94a3b8"/>

  <!-- Latency badge -->
  <rect x="170" y="318" width="120" height="22" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">10ms to 50ms</text>

  <!-- Data stays local badge -->
  <rect x="320" y="318" width="140" height="22" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Data stays local</text>

  <!-- Branch point below sidecar -->
  <line x1="360" y1="355" x2="360" y2="390" stroke="#475569" stroke-width="2"/>
  <circle cx="360" cy="395" r="6" fill="#475569"/>

  <!-- GO branch (left) -->
  <line x1="354" y1="395" x2="160" y2="395" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="160" y1="395" x2="160" y2="440" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="160,445 155,435 165,435" fill="#22c55e"/>

  <rect x="210" y="382" width="60" height="20" rx="3" fill="#dcfce7"/>
  <text x="240" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">GO</text>

  <rect x="75" y="450" width="170" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Core Banking API</text>
  <text x="160" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Action executes normally</text>

  <!-- NO-GO branch (right) -->
  <line x1="366" y1="395" x2="560" y2="395" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="560" y1="395" x2="560" y2="440" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="560,445 555,435 565,435" fill="#ef4444"/>

  <rect x="440" y="382" width="70" height="20" rx="3" fill="#fee2e2"/>
  <text x="475" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#b91c1c">NO-GO</text>

  <rect x="475" y="450" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="560" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b91c1c">Refusal / Log</text>
  <text x="560" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b91c1c">Blocked before network</text>

  <!-- ESCALATE branch (center) -->
  <line x1="360" y1="401" x2="360" y2="440" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="360,445 355,435 365,435" fill="#f59e0b"/>

  <rect x="285" y="450" width="150" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309">Escalate</text>
  <text x="360" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">Sent to Large Judge / Human</text>

  <!-- Audit log arrow from all three -->
  <line x1="160" y1="505" x2="160" y2="545" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="360" y1="505" x2="360" y2="545" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="505" x2="560" y2="545" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Audit log bar -->
  <rect x="100" y="550" width="520" height="35" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#475569">Audit Log (verdict + reasoning + action + timestamp)</text>

  <!-- Key message -->
  <rect x="160" y="597" width="400" height="18" rx="3" fill="none"/>
  <text x="360" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Action checked in-memory before it reaches any external system</text>
</svg>
