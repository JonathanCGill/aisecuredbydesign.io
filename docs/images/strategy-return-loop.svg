<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" role="img" aria-label="Return loop process: monitoring signal detected triggers triage between operational and strategic paths, with strategic issues returning to appropriate earlier phases">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="750" height="480" rx="8" fill="url(#bgGrad)"/>

  <text x="375" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">The Return Loop Process</text>

  <!-- Monitoring Signal Detected -->
  <rect x="230" y="48" width="290" height="40" rx="8" fill="#ef4444" filter="url(#shadow)"/>
  <text x="375" y="73" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">MONITORING SIGNAL DETECTED</text>
  <line x1="375" y1="88" x2="375" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Triage diamond -->
  <polygon points="375,115 475,150 375,185 275,150" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="147" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">TRIAGE</text>
  <text x="375" y="160" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Operational or Strategic?</text>

  <!-- Operational branch (left) -->
  <line x1="275" y1="150" x2="140" y2="150" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="200" y="142" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#10b981">Operational</text>

  <rect x="20" y="130" width="120" height="70" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="152" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">Resolve in</text>
  <text x="80" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#059669" text-anchor="middle">Phase 5</text>
  <text x="80" y="185" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">No return loop needed</text>

  <!-- Strategic branch (down) -->
  <line x1="375" y1="185" x2="375" y2="218" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="395" y="205" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#ef4444">Strategic</text>

  <!-- Reassessment box -->
  <rect x="260" y="225" width="230" height="35" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="247" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">REASSESSMENT: Which phase?</text>

  <!-- Four return options -->
  <line x1="375" y1="260" x2="375" y2="280" stroke="#64748b" stroke-width="1"/>

  <!-- Option 1: Use case scope changed -->
  <line x1="375" y1="280" x2="130" y2="280" stroke="#64748b" stroke-width="1"/>
  <line x1="130" y1="280" x2="130" y2="295" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="300" width="180" height="55" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="320" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Use case scope changed</text>
  <text x="130" y="335" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">→ Return to Phase 2</text>
  <text x="130" y="348" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Definition)</text>

  <!-- Option 2: Risk profile changed -->
  <line x1="375" y1="280" x2="310" y2="280" stroke="#64748b" stroke-width="1"/>
  <line x1="310" y1="280" x2="310" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="220" y="370" width="180" height="55" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#7c3aed" text-anchor="middle">Risk profile changed</text>
  <text x="310" y="405" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">→ Return to Phase 3</text>
  <text x="310" y="418" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Classification)</text>

  <!-- Option 3: Controls inadequate -->
  <line x1="375" y1="280" x2="440" y2="280" stroke="#64748b" stroke-width="1"/>
  <line x1="440" y1="280" x2="440" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="370" width="180" height="55" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#d97706" text-anchor="middle">Controls inadequate</text>
  <text x="440" y="405" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">→ Return to Phase 3</text>
  <text x="440" y="418" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Control Design)</text>

  <!-- Option 4: Technology mismatch -->
  <line x1="375" y1="280" x2="620" y2="280" stroke="#64748b" stroke-width="1"/>
  <line x1="620" y1="280" x2="620" y2="295" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="300" width="180" height="55" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="320" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">Technology mismatch</text>
  <text x="620" y="335" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">→ Return to Phase 1</text>
  <text x="620" y="348" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Filter)</text>
</svg>