<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="classifierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="judgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="finalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="intentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1e3a"/>
      <stop offset="100%" stop-color="#1e2240"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" fill="#fff" font-size="15" font-weight="700" letter-spacing="1.5">MULTI-AGENT RISK EVALUATION DEMONSTRATOR</text>
  <text x="480" y="48" text-anchor="middle" fill="#a855f7" font-size="10" letter-spacing="1">CLASSIFY · ORCHESTRATE · EVALUATE · JUDGE</text>
  <line x1="150" y1="58" x2="810" y2="58" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 1: USER PROMPT -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="370" y="72" width="220" height="55" rx="8" fill="url(#userGrad)" filter="url(#shadow)"/>
  <text x="480" y="95" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">User Prompt</text>
  <text x="480" y="112" text-anchor="middle" fill="#cbd5e1" font-size="9">Untrusted input enters the system</text>
  <!-- Step label -->
  <rect x="330" y="85" width="36" height="18" rx="9" fill="#a855f7"/>
  <text x="348" y="98" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">1</text>

  <!-- Arrow down to classifier -->
  <line x1="480" y1="127" x2="480" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 2: RISK CLASSIFIER + RAG/SYSTEM PROMPT -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="300" y="155" width="360" height="75" rx="10" fill="url(#classifierGrad)" filter="url(#shadow)"/>
  <rect x="300" y="155" width="360" height="4" rx="2" fill="#c084fc"/>
  <text x="480" y="180" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Risk Classifier Model</text>
  <text x="480" y="196" text-anchor="middle" fill="#e9d5ff" font-size="9">Categorises prompt risk level using RAG context + system prompt rules</text>
  <text x="480" y="212" text-anchor="middle" fill="#e9d5ff" font-size="9">Outputs: risk tier (LOW / MEDIUM / HIGH / CRITICAL) + classification rationale</text>
  <!-- Step label -->
  <rect x="260" y="178" width="36" height="18" rx="9" fill="#a855f7"/>
  <text x="278" y="191" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">2</text>

  <!-- RAG / System Prompt box (left) -->
  <rect x="50" y="160" width="200" height="65" rx="8" fill="url(#ragGrad)" filter="url(#shadow)"/>
  <rect x="50" y="160" width="200" height="3" rx="2" fill="#818cf8"/>
  <text x="150" y="183" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">RAG Context + System Prompt</text>
  <text x="150" y="198" text-anchor="middle" fill="#a5b4fc" font-size="8">Risk parameters, policies,</text>
  <text x="150" y="210" text-anchor="middle" fill="#a5b4fc" font-size="8">domain-specific classification rules</text>
  <!-- Arrow from RAG to classifier -->
  <line x1="250" y1="192" x2="298" y2="192" stroke="#818cf8" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

  <!-- Intent Store box (right) -->
  <rect x="710" y="160" width="200" height="65" rx="8" fill="url(#intentGrad)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="810" y="183" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Intent Store</text>
  <text x="810" y="198" text-anchor="middle" fill="#fcd34d" font-size="8">Each model's declared intent,</text>
  <text x="810" y="210" text-anchor="middle" fill="#fcd34d" font-size="8">scope, and constraints (database)</text>
  <!-- Arrow from intent store to classifier -->
  <line x1="710" y1="192" x2="662" y2="192" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowAmber)"/>

  <!-- Arrow down to orchestrator -->
  <line x1="480" y1="230" x2="480" y2="262" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  <text x="510" y="250" fill="#94a3b8" font-size="8" font-style="italic">classified prompt</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 3: ORCHESTRATOR -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="295" y="264" width="370" height="70" rx="10" fill="url(#orchGrad)" filter="url(#shadow)"/>
  <rect x="295" y="264" width="370" height="4" rx="2" fill="#60a5fa"/>
  <text x="480" y="292" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Orchestrator</text>
  <text x="480" y="308" text-anchor="middle" fill="#bfdbfe" font-size="9">Decomposes prompt into sub-tasks, assigns to specialist agents, manages progress</text>
  <text x="480" y="322" text-anchor="middle" fill="#93c5fd" font-size="8">Maintains task graph, tracks completion, handles failures</text>
  <!-- Step label -->
  <rect x="255" y="285" width="36" height="18" rx="9" fill="#3b82f6"/>
  <text x="273" y="298" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">3</text>

  <!-- Intent store connection to orchestrator -->
  <line x1="810" y1="225" x2="810" y2="299" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="810" y1="299" x2="667" y2="299" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arrowAmber)"/>

  <!-- Fan-out arrows from orchestrator to agents -->
  <line x1="370" y1="334" x2="160" y2="385" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="480" y1="334" x2="480" y2="385" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="590" y1="334" x2="800" y2="385" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>

  <text x="260" y="360" fill="#22d3ee" font-size="8" font-style="italic">task 1</text>
  <text x="490" y="365" fill="#22d3ee" font-size="8" font-style="italic">task 2</text>
  <text x="690" y="360" fill="#22d3ee" font-size="8" font-style="italic">task 3</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 4: SPECIALIST AGENTS -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Agent A -->
  <rect x="55" y="387" width="210" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <rect x="55" y="387" width="210" height="3" rx="2" fill="#67e8f9"/>
  <text x="160" y="412" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent A: Data Retrieval</text>
  <text x="160" y="428" text-anchor="middle" fill="#cffafe" font-size="8">Fetches data from approved sources</text>
  <text x="160" y="441" text-anchor="middle" fill="#a5f3fc" font-size="7">Intent: retrieve only, no mutation</text>
  <text x="160" y="457" text-anchor="middle" fill="#67e8f9" font-size="7" font-weight="600">System prompt + guardrails active</text>

  <!-- Agent B -->
  <rect x="375" y="387" width="210" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <rect x="375" y="387" width="210" height="3" rx="2" fill="#67e8f9"/>
  <text x="480" y="412" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent B: Analysis</text>
  <text x="480" y="428" text-anchor="middle" fill="#cffafe" font-size="8">Processes and reasons over data</text>
  <text x="480" y="441" text-anchor="middle" fill="#a5f3fc" font-size="7">Intent: analyse only, no external calls</text>
  <text x="480" y="457" text-anchor="middle" fill="#67e8f9" font-size="7" font-weight="600">System prompt + guardrails active</text>

  <!-- Agent C -->
  <rect x="695" y="387" width="210" height="80" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <rect x="695" y="387" width="210" height="3" rx="2" fill="#67e8f9"/>
  <text x="800" y="412" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Agent C: Response Draft</text>
  <text x="800" y="428" text-anchor="middle" fill="#cffafe" font-size="8">Synthesises findings into response</text>
  <text x="800" y="441" text-anchor="middle" fill="#a5f3fc" font-size="7">Intent: compose only, no tool access</text>
  <text x="800" y="457" text-anchor="middle" fill="#67e8f9" font-size="7" font-weight="600">System prompt + guardrails active</text>

  <!-- Step label -->
  <rect x="15" y="413" width="36" height="18" rx="9" fill="#06b6d4"/>
  <text x="33" y="426" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">4</text>

  <!-- Arrows down from agents to per-task judges -->
  <line x1="160" y1="467" x2="160" y2="510" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrowAmber)"/>
  <line x1="480" y1="467" x2="480" y2="510" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrowAmber)"/>
  <line x1="800" y1="467" x2="800" y2="510" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrowAmber)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 5: PER-TASK JUDGES (small models) -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Judge A -->
  <rect x="65" y="512" width="190" height="65" rx="8" fill="url(#judgeGrad)" filter="url(#shadow)"/>
  <rect x="65" y="512" width="190" height="3" rx="2" fill="#fcd34d"/>
  <text x="160" y="536" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Task Judge (SLM)</text>
  <text x="160" y="550" text-anchor="middle" fill="#fef3c7" font-size="8">Evaluates Agent A output</text>
  <text x="160" y="564" text-anchor="middle" fill="#fde68a" font-size="7">Checks: data integrity, scope compliance</text>

  <!-- Judge B -->
  <rect x="385" y="512" width="190" height="65" rx="8" fill="url(#judgeGrad)" filter="url(#shadow)"/>
  <rect x="385" y="512" width="190" height="3" rx="2" fill="#fcd34d"/>
  <text x="480" y="536" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Task Judge (SLM)</text>
  <text x="480" y="550" text-anchor="middle" fill="#fef3c7" font-size="8">Evaluates Agent B output</text>
  <text x="480" y="564" text-anchor="middle" fill="#fde68a" font-size="7">Checks: reasoning quality, hallucination</text>

  <!-- Judge C -->
  <rect x="705" y="512" width="190" height="65" rx="8" fill="url(#judgeGrad)" filter="url(#shadow)"/>
  <rect x="705" y="512" width="190" height="3" rx="2" fill="#fcd34d"/>
  <text x="800" y="536" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Task Judge (SLM)</text>
  <text x="800" y="550" text-anchor="middle" fill="#fef3c7" font-size="8">Evaluates Agent C output</text>
  <text x="800" y="564" text-anchor="middle" fill="#fde68a" font-size="7">Checks: tone, accuracy, policy alignment</text>

  <!-- Step label -->
  <rect x="25" y="530" width="36" height="18" rx="9" fill="#f59e0b"/>
  <text x="43" y="543" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">5</text>

  <!-- Pass/Fail indicators on judges -->
  <circle cx="245" cy="545" r="6" fill="#22c55e" opacity="0.9"/>
  <text x="245" y="548" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">P</text>
  <circle cx="565" cy="545" r="6" fill="#22c55e" opacity="0.9"/>
  <text x="565" y="548" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">P</text>
  <circle cx="885" cy="545" r="6" fill="#ef4444" opacity="0.9"/>
  <text x="885" y="548" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">F</text>

  <!-- Arrows from per-task judges converging to final judge -->
  <line x1="160" y1="577" x2="160" y2="620" stroke="#10b981" stroke-width="1"/>
  <line x1="160" y1="620" x2="380" y2="650" stroke="#10b981" stroke-width="1"/>
  <line x1="480" y1="577" x2="480" y2="650" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="800" y1="577" x2="800" y2="620" stroke="#10b981" stroke-width="1"/>
  <line x1="800" y1="620" x2="580" y2="650" stroke="#10b981" stroke-width="1"/>

  <text x="300" y="618" fill="#10b981" font-size="8" font-style="italic">verdict + evidence</text>
  <text x="620" y="618" fill="#10b981" font-size="8" font-style="italic">verdict + evidence</text>

  <!-- Orchestrator feedback loop (left side) -->
  <path d="M 65 545 Q 35 545 35 420 Q 35 340 295 299" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGrey)"/>
  <text x="20" y="440" fill="#f87171" font-size="7" transform="rotate(-90,20,440)">retry / escalate</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STEP 6: FINAL EVALUATION JUDGE -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="295" y="652" width="370" height="80" rx="10" fill="url(#finalGrad)" filter="url(#shadow)"/>
  <rect x="295" y="652" width="370" height="4" rx="2" fill="#34d399"/>
  <text x="480" y="680" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Final Evaluation Judge</text>
  <text x="480" y="696" text-anchor="middle" fill="#a7f3d0" font-size="9">Holistic review: coherence, safety, policy compliance, risk alignment</text>
  <text x="480" y="712" text-anchor="middle" fill="#6ee7b7" font-size="9">Aggregates per-task verdicts, applies overall risk threshold, produces audit trail</text>
  <text x="480" y="724" text-anchor="middle" fill="#86efac" font-size="8">Can use SLM (fast) or LLM (thorough) based on risk tier</text>

  <!-- Step label -->
  <rect x="255" y="678" width="36" height="18" rx="9" fill="#10b981"/>
  <text x="273" y="691" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">6</text>

  <!-- Intent store connection to final judge -->
  <line x1="810" y1="225" x2="810" y2="692" stroke="#fbbf24" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="810" y1="692" x2="667" y2="692" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arrowAmber)"/>
  <text x="740" y="686" fill="#fbbf24" font-size="7" font-style="italic">intent check</text>

  <!-- Arrow down to output -->
  <line x1="480" y1="732" x2="480" y2="758" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- OUTPUT -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="340" y="760" width="300" height="45" rx="8" fill="url(#userGrad)" filter="url(#shadow)"/>
  <text x="490" y="782" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Evaluated Output + Audit Trail</text>
  <text x="490" y="797" text-anchor="middle" fill="#cbd5e1" font-size="9">Delivered to user with risk score and decision rationale</text>

  <!-- APPROVE / BLOCK labels -->
  <rect x="400" y="742" width="55" height="16" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="427" y="753" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">APPROVE</text>
  <rect x="505" y="742" width="50" height="16" rx="8" fill="#ef4444" opacity="0.9"/>
  <text x="530" y="753" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">BLOCK</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="50" y="670" width="200" height="120" rx="6" fill="#0d1225" stroke="#334" stroke-width="0.8"/>
  <text x="60" y="690" fill="#fff" font-size="9" font-weight="600">Flow Legend</text>
  <rect x="60" y="698" width="10" height="10" rx="2" fill="#a855f7"/>
  <text x="76" y="707" fill="#94a3b8" font-size="8">Risk Classification</text>
  <rect x="60" y="714" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="76" y="723" fill="#94a3b8" font-size="8">Orchestration</text>
  <rect x="60" y="730" width="10" height="10" rx="2" fill="#06b6d4"/>
  <text x="76" y="739" fill="#94a3b8" font-size="8">Specialist Agents</text>
  <rect x="60" y="746" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="76" y="755" fill="#94a3b8" font-size="8">Per-Task Judges (SLM)</text>
  <rect x="60" y="762" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="76" y="771" fill="#94a3b8" font-size="8">Final Evaluation Judge</text>
  <line x1="60" y1="783" x2="70" y2="783" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="76" y="786" fill="#94a3b8" font-size="8">Intent verification</text>
</svg>