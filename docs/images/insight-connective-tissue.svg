<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Securing the Connective Tissue</text>
  <text x="450" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Three emerging patterns moving from lab to production in 2026</text>

  <!-- Central hub: "The Connective Tissue" -->
  <rect x="340" y="70" width="220" height="50" rx="25" fill="#1e293b" stroke="none"/>
  <text x="450" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Agent-to-Agent Communication</text>
  <text x="450" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">The new attack surface</text>

  <!-- Lines from hub to three pillars -->
  <line x1="370" y1="120" x2="155" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="450" y1="120" x2="450" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="530" y1="120" x2="745" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Pillar 1: Agentic Service Mesh -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="270" height="210" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="270" height="40" rx="10" fill="#3b82f6"/>
    <rect x="0" y="20" width="270" height="20" fill="#3b82f6"/>
    <text x="135" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Agentic Service Mesh</text>
    <text x="135" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#bfdbfe">Air Traffic Control for AI</text>

    <!-- Diagram: Agent A -> Mesh -> Agent B -->
    <rect x="20" y="55" width="55" height="30" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="47" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e40af">Agent A</text>

    <line x1="75" y1="70" x2="95" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="95" y="50" width="80" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="135" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#1d4ed8">SERVICE MESH</text>
    <text x="135" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#3b82f6">mTLS + Policy</text>

    <line x1="175" y1="70" x2="195" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="195" y="55" width="55" height="30" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="222" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e40af">Agent B</text>

    <!-- Shield on mesh -->
    <text x="135" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">🛡</text>

    <!-- Key capabilities -->
    <line x1="20" y1="100" x2="250" y2="100" stroke="#e5e7eb" stroke-width="1"/>
    <text x="25" y="118" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="118" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Mutual TLS between all agents</text>
    <text x="25" y="133" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="133" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Cryptographic token validation on every call</text>
    <text x="25" y="148" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="148" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Traffic shaping: who can talk to whom</text>
    <text x="25" y="163" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="163" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Blocks hallucinated inter-agent instructions</text>

    <!-- Threat prevented -->
    <rect x="20" y="175" width="230" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="135" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b">Prevents: Agent A tricks Agent B into skipping checks</text>
  </g>

  <!-- Pillar 2: Proof of Inference (ZK-ML) -->
  <g transform="translate(315, 160)">
    <rect x="0" y="0" width="270" height="210" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="270" height="40" rx="10" fill="#8b5cf6"/>
    <rect x="0" y="20" width="270" height="20" fill="#8b5cf6"/>
    <text x="135" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Proof of Inference (ZK-ML)</text>
    <text x="135" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ddd6fe">The DNA Test for AI Outputs</text>

    <!-- Diagram: Model -> ZK Proof -> Verifier -->
    <rect x="20" y="55" width="55" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="47" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#5b21b6">Model</text>

    <line x1="75" y1="70" x2="95" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="95" y="50" width="80" height="40" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="135" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#5b21b6">ZK PROOF</text>
    <text x="135" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#7c3aed">Verifiable trace</text>

    <line x1="175" y1="70" x2="195" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="195" y="55" width="55" height="30" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="222" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#5b21b6">Verify</text>

    <!-- Lock icon -->
    <text x="135" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6">🔐</text>

    <!-- Key capabilities -->
    <line x1="20" y1="100" x2="250" y2="100" stroke="#e5e7eb" stroke-width="1"/>
    <text x="25" y="118" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="118" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Proves output came from the claimed model</text>
    <text x="25" y="133" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="133" font-family="system-ui, sans-serif" font-size="8" fill="#374151">No model weights or raw data exposed</text>
    <text x="25" y="148" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="148" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Feasible for models up to ~13B parameters</text>
    <text x="25" y="163" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="163" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Regulatory-grade audit evidence</text>

    <!-- Threat prevented -->
    <rect x="20" y="175" width="230" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="135" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b">Prevents: Model substitution, inference tampering</text>
  </g>

  <!-- Pillar 3: Active Red-Teaming at Runtime -->
  <g transform="translate(610, 160)">
    <rect x="0" y="0" width="270" height="210" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="270" height="40" rx="10" fill="#ef4444"/>
    <rect x="0" y="20" width="270" height="20" fill="#ef4444"/>
    <text x="135" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Active Runtime Red-Teaming</text>
    <text x="135" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fecaca">Ghost Agents in Production</text>

    <!-- Diagram: Ghost Agent -> Production Agent -> Update -->
    <rect x="20" y="55" width="55" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="47" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#991b1b">Ghost</text>
    <text x="47" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#991b1b">Agent</text>

    <line x1="75" y1="70" x2="95" y2="70" stroke="#ef4444" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrowhead)"/>

    <rect x="95" y="50" width="80" height="40" rx="4" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <text x="135" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#c2410c">PRODUCTION</text>
    <text x="135" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#ea580c">Agent</text>

    <line x1="175" y1="70" x2="195" y2="70" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

    <rect x="195" y="55" width="55" height="30" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="222" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#166534">Auto</text>
    <text x="222" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#166534">Harden</text>

    <!-- Cycle arrow from Harden back to Ghost -->
    <path d="M 222 90 L 222 95 Q 222 100 217 100 L 52 100 Q 47 100 47 95 L 47 90" fill="none" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="135" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">continuous feedback loop</text>

    <!-- Key capabilities -->
    <line x1="20" y1="115" x2="250" y2="115" stroke="#e5e7eb" stroke-width="1"/>
    <text x="25" y="131" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="131" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Adversarial agents run continuously in prod</text>
    <text x="25" y="146" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="146" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Violations auto-captured and analysed</text>
    <text x="25" y="161" font-family="system-ui, sans-serif" font-size="8" fill="#059669">✓</text>
    <text x="38" y="161" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Guardrails updated in real time</text>

    <!-- Threat prevented -->
    <rect x="20" y="175" width="230" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="135" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b">Prevents: Controls decaying against novel attacks</text>
  </g>

  <!-- Bottom: Maturity spectrum -->
  <rect x="30" y="390" width="840" height="55" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">2026 Maturity Spectrum</text>

  <rect x="50" y="420" width="180" height="18" rx="4" fill="#dbeafe"/>
  <text x="140" y="433" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e40af">Service Mesh: Production-ready</text>

  <rect x="260" y="420" width="180" height="18" rx="4" fill="#ede9fe"/>
  <text x="350" y="433" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#5b21b6">ZK-ML: Early production (SLMs)</text>

  <rect x="470" y="420" width="180" height="18" rx="4" fill="#fef2f2"/>
  <text x="560" y="433" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#991b1b">Ghost Agents: Emerging practice</text>

  <!-- Key insight -->
  <rect x="30" y="460" width="840" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="482" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">The 2026 Shift</text>
  <text x="450" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">We stopped asking "Is this model safe?" and started asking "Is the space between models secure?"</text>
  <text x="450" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">The connective tissue is the new perimeter.</text>
</svg>
