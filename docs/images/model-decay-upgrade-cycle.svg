<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 520" width="750" height="520">
  <style>
    .title { font: bold 15px Inter, Arial, sans-serif; fill: #1e293b; }
    .label { font: bold 11px Inter, Arial, sans-serif; fill: #1e293b; }
    .detail { font: 9px Inter, Arial, sans-serif; fill: #64748b; }
    .trigger-label { font: bold 9px Inter, Arial, sans-serif; fill: #991b1b; }
    .trigger-detail { font: 9px Inter, Arial, sans-serif; fill: #991b1b; }
    .phase { font: bold 10px Inter, Arial, sans-serif; fill: #475569; }
    .arrow { fill: #475569; }
  </style>

  <!-- Background -->
  <rect width="750" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" class="title">Model Decay and the Upgrade Cycle</text>

  <!-- Timeline axis -->
  <line x1="80" y1="80" x2="680" y2="80" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" class="phase">Time in production</text>

  <!-- Performance curve (declining) -->
  <text x="55" y="200" text-anchor="middle" class="detail" transform="rotate(-90,55,200)" fill="#475569">Model effectiveness</text>
  <line x1="80" y1="100" x2="80" y2="320" stroke="#94a3b8" stroke-width="1"/>

  <!-- Curve: starts high, decays -->
  <path d="M 100,110 C 180,112 250,120 320,145 C 380,165 430,200 480,240 C 520,270 560,290 620,305" fill="none" stroke="#6366f1" stroke-width="2.5"/>

  <!-- Acceptable threshold line -->
  <line x1="100" y1="250" x2="620" y2="250" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="635" y="254" class="detail" fill="#ef4444">Minimum acceptable</text>
  <text x="635" y="265" class="detail" fill="#ef4444">threshold</text>

  <!-- Phase labels along curve -->
  <rect x="105" y="92" width="100" height="24" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="108" text-anchor="middle" class="detail" fill="#166534" font-weight="bold">Peak performance</text>

  <rect x="270" y="125" width="100" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="141" text-anchor="middle" class="detail" fill="#92400e" font-weight="bold">Drift begins</text>

  <rect x="440" y="218" width="100" height="24" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="490" y="234" text-anchor="middle" class="detail" fill="#991b1b" font-weight="bold">Degraded</text>

  <!-- Decay factors box -->
  <rect x="40" y="340" width="230" height="155" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="155" y="360" text-anchor="middle" class="label" fill="#991b1b">What causes decay</text>

  <text x="60" y="380" class="trigger-detail">&#x2022; Data drift: real-world distribution shifts</text>
  <text x="60" y="396" class="trigger-detail">&#x2022; Vendor updates behind stable API</text>
  <text x="60" y="412" class="trigger-detail">&#x2022; New attack vectors discovered</text>
  <text x="60" y="428" class="trigger-detail">&#x2022; Regulatory environment changes</text>
  <text x="60" y="444" class="trigger-detail">&#x2022; Competitor model improvements</text>
  <text x="60" y="460" class="trigger-detail">&#x2022; Upstream dependency deprecation</text>
  <text x="60" y="476" class="trigger-detail">&#x2022; Use case scope expansion</text>

  <!-- Revalidation triggers box -->
  <rect x="290" y="340" width="200" height="155" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="360" text-anchor="middle" class="label" fill="#92400e">Revalidation triggers</text>

  <text x="310" y="380" class="detail" fill="#92400e">&#x2022; Periodic review (annual,</text>
  <text x="316" y="393" class="detail" fill="#92400e">6-monthly for Tier 3)</text>
  <text x="310" y="410" class="detail" fill="#92400e">&#x2022; Vendor checkpoint change</text>
  <text x="310" y="427" class="detail" fill="#92400e">&#x2022; Drift detection alert</text>
  <text x="310" y="444" class="detail" fill="#92400e">&#x2022; Security vulnerability</text>
  <text x="310" y="461" class="detail" fill="#92400e">&#x2022; Incident or near-miss</text>
  <text x="310" y="478" class="detail" fill="#92400e">&#x2022; Material scope change</text>

  <!-- Upgrade path box -->
  <rect x="510" y="340" width="210" height="155" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="360" text-anchor="middle" class="label" fill="#166534">Upgrade path</text>

  <text x="530" y="380" class="detail" fill="#166534">&#x2022; Fast-track: minor version,</text>
  <text x="536" y="393" class="detail" fill="#166534">same vendor (5 days)</text>
  <text x="530" y="410" class="detail" fill="#166534">&#x2022; Standard: new model,</text>
  <text x="536" y="423" class="detail" fill="#166534">full onboarding</text>
  <text x="530" y="440" class="detail" fill="#166534">&#x2022; Emergency: break-glass,</text>
  <text x="536" y="453" class="detail" fill="#166534">30-day review deadline</text>
  <text x="530" y="470" class="detail" fill="#166534">&#x2022; Exit strategy: migrate</text>
  <text x="536" y="483" class="detail" fill="#166534">to alternative model</text>

  <!-- Connecting arrows from decay to triggers to upgrade -->
  <line x1="270" y1="417" x2="285" y2="417" stroke="#475569" stroke-width="1"/>
  <polygon points="290,417 283,412 283,422" class="arrow"/>

  <line x1="490" y1="417" x2="505" y2="417" stroke="#475569" stroke-width="1"/>
  <polygon points="510,417 503,412 503,422" class="arrow"/>

  <!-- New model curve (replacement) -->
  <path d="M 520,240 C 540,170 560,130 580,115 C 600,108 620,106 660,105" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="590" y="100" class="detail" fill="#166534" font-weight="bold">Replacement model</text>

  <!-- Upgrade point marker -->
  <circle cx="520" cy="240" r="5" fill="#22c55e" stroke="#166534" stroke-width="1.5"/>
  <line x1="520" y1="245" x2="520" y2="275" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="520" y="290" text-anchor="middle" class="detail" fill="#166534" font-weight="bold">Upgrade point</text>
  <text x="520" y="302" text-anchor="middle" class="detail" fill="#166534">Before threshold breach</text>
</svg>
