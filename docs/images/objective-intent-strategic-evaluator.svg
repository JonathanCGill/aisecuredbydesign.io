<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 170" role="img" aria-label="Strategic Evaluator: Aggregate outputs, audit trail, agent OISpecs, and judge verdicts are evaluated by the strategic evaluator against the workflow OISpec to assess workflow intent satisfaction and emergent issues">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="760" height="170" rx="8" fill="url(#bgGrad)"/>

  <text x="380" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Level 2: Strategic Evaluator</text>

  <!-- Inputs -->
  <rect x="20" y="45" width="190" height="90" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="115" y="68" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Aggregate outputs</text>
  <text x="115" y="83" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+ audit trail</text>
  <text x="115" y="96" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+ all agent OISpecs</text>
  <text x="115" y="109" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+ all judge verdicts</text>

  <!-- Arrow -->
  <line x1="210" y1="90" x2="275" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Strategic Evaluator -->
  <rect x="280" y="45" width="200" height="90" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="380" y="72" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">Strategic Evaluator</text>
  <text x="380" y="92" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Evaluates against</text>
  <text x="380" y="105" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">workflow OISpec</text>
  <text x="380" y="118" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">+ aggregated intents</text>

  <!-- Arrow -->
  <line x1="480" y1="90" x2="535" y2="90" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Verdict -->
  <rect x="540" y="45" width="200" height="90" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="72" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">Verdict</text>
  <text x="640" y="92" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Workflow intent satisfied?</text>
  <text x="640" y="105" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Emergent issues?</text>
  <text x="640" y="118" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Intent gaps?</text>

  <text x="380" y="158" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Did the system as a whole achieve what was intended, and did the agents collectively behave as designed?</text>
</svg>
