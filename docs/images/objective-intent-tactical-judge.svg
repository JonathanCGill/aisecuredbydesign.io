<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="Tactical Judge Evaluation: Agent action or output is evaluated by a tactical judge against the agent's OISpec to produce a verdict on compliance, parameter breach, or authority exceed">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="720" height="160" rx="8" fill="url(#bgGrad)"/>

  <text x="360" y="24" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Level 1: Tactical Judge Evaluation</text>

  <!-- Agent Action/Output -->
  <rect x="20" y="50" width="180" height="70" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="110" y="78" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Agent Action /</text>
  <text x="110" y="95" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Output</text>

  <!-- Arrow -->
  <line x1="200" y1="85" x2="255" y2="85" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tactical Judge -->
  <rect x="260" y="50" width="180" height="70" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="75" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle">Tactical Judge</text>
  <text x="350" y="95" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Evaluates against</text>
  <text x="350" y="108" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">agent's OISpec</text>

  <!-- Arrow -->
  <line x1="440" y1="85" x2="495" y2="85" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Verdict -->
  <rect x="500" y="50" width="200" height="70" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="72" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">Verdict</text>
  <text x="600" y="88" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">OISpec compliant?</text>
  <text x="600" y="100" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Parameter breach?</text>
  <text x="600" y="112" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Authority exceed?</text>

  <text x="360" y="148" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Did this agent do what it was supposed to do, within the parameters it was given?</text>
</svg>
